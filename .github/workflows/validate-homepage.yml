name: Validate homepage contract

on:
  pull_request:
    paths:
      - "index.html"
      - "scripts/validate_homepage_contract.py"
      - ".github/workflows/validate-homepage.yml"
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "scripts/validate_homepage_contract.py"
      - ".github/workflows/validate-homepage.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate the complete site first
        run: python scripts/validate_site.py .

      - name: Validate the redesigned homepage contract
        run: python scripts/validate_homepage_contract.py .

