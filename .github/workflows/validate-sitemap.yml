name: Validate sitemap

on:
  pull_request:
    paths:
      - "sitemap.xml"
      - "scripts/validate_sitemap.py"
      - ".github/workflows/validate-sitemap.yml"
  push:
    branches:
      - main
    paths:
      - "sitemap.xml"
      - "scripts/validate_sitemap.py"
      - ".github/workflows/validate-sitemap.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate sitemap
        run: python scripts/validate_sitemap.py
