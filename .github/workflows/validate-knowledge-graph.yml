name: Validate knowledge graph

on:
  pull_request:
    paths:
      - "data/knowledge-graph.jsonld"
      - "scripts/validate_knowledge_graph.py"
      - ".github/workflows/validate-knowledge-graph.yml"
  push:
    branches:
      - main
    paths:
      - "data/knowledge-graph.jsonld"
      - "scripts/validate_knowledge_graph.py"
      - ".github/workflows/validate-knowledge-graph.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate knowledge graph
        run: python scripts/validate_knowledge_graph.py
