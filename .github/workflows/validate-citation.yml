name: Validate CITATION.cff

on:
  pull_request:
    paths:
      - "CITATION.cff"
      - ".github/workflows/validate-citation.yml"
  push:
    branches:
      - main
    paths:
      - "CITATION.cff"
      - ".github/workflows/validate-citation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CFF validator
        run: python -m pip install --disable-pip-version-check cffconvert==2.0.0

      - name: Validate CITATION.cff
        run: cffconvert --validate
